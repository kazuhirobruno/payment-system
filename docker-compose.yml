version: '3.8'

networks:
  gv-network:
    driver: bridge

volumes:
  pgadmin_data:

services:
  postgres:
    container_name: payment_transfer
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin
      - POSTGRES_DB=sistema_pagamento
    networks:
      - gv-network
    
  pgadmin: 
    container_name: pgadmin_container
    image: dpage/pgadmin4
    ports:
      - "8082:80"
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@admin.com
      - PGADMIN_DEFAULT_PASSWORD=admin
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - gv-network